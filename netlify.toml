# ─── Redirecciones 301: demanda heredada de TARIMAS → Onepack ───
# El dominio gcm.com.sv era un sitio WordPress de tarimas (hasta Feb/Mar 2026).
# Esas URLs hoy dan 404 pero Google aún las muestra. Las enviamos a Onepack
# (negocio de tarimas) para recuperar al cliente y transferir autoridad SEO.
[[redirects]]
  from = "/tarimas-de-madera/"
  to = "https://www.onepack.com.sv/pallets"
  status = 301
  force = true

[[redirects]]
  from = "/tarimas-de-madera"
  to = "https://www.onepack.com.sv/pallets"
  status = 301
  force = true

[[redirects]]
  from = "/tarimas-plasticas/"
  to = "https://www.onepack.com.sv/pallets"
  status = 301
  force = true

[[redirects]]
  from = "/tarimas-plasticas"
  to = "https://www.onepack.com.sv/pallets"
  status = 301
  force = true

[[redirects]]
  from = "/tarimas/"
  to = "https://www.onepack.com.sv/pallets"
  status = 301
  force = true

[[redirects]]
  from = "/tarimas"
  to = "https://www.onepack.com.sv/pallets"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-ancestors 'none';"
